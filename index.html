<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Suporte TI</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:       #0e0e10;
      --bg2:      #141416;
      --bg3:      #1c1c1f;
      --border:   #2a2a2e;
      --border2:  #3a3a3f;
      --text:     #e8e8ea;
      --muted:    #666670;
      --muted2:   #888892;
      --accent:   #e8e8ea;
      --green:    #22c55e;
      --amber:    #d4a017;
      --blue:     #4f7fff;
      --red:      #ef4444;
      --mono:     'IBM Plex Mono', monospace;
      --sans:     'IBM Plex Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

    /* TOPBAR */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 44px; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .topbar-brand { font-family: var(--mono); font-size: 12px; font-weight: 500; color: var(--muted2); letter-spacing: 0.08em; text-transform: uppercase; }
    .topbar-brand span { color: var(--text); }

    /* NAV */
    .nav { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); padding: 0 20px; gap: 0; }
    .nav-btn { padding: 10px 16px; font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--muted); background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; letter-spacing: 0.03em; transition: all 0.15s; white-space: nowrap; }
    .nav-btn:hover { color: var(--text); }
    .nav-btn.ativo { color: var(--text); border-bottom-color: var(--text); }
    .nav-btn.avisos-btn.ativo { color: var(--amber); border-bottom-color: var(--amber); }
    .nav-btn.avisos-btn:hover { color: var(--amber); }

    /* CONTEÚDO */
    .content { padding: 20px; max-width: 680px; margin: 0 auto; }
    .content.wide { max-width: 860px; }

    /* FORMULÁRIO */
    .section-label { font-family: var(--mono); font-size: 10px; font-weight: 500; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 14px; }
    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 11px; font-weight: 500; color: var(--muted2); margin-bottom: 5px; letter-spacing: 0.04em; }
    .field input, .field select, .field textarea {
      width: 100%; padding: 8px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border 0.15s;
    }
    .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--border2); }
    .field select option { background: var(--bg3); }
    .field textarea { resize: vertical; min-height: 90px; }
    .field-erro { font-size: 11px; color: var(--red); margin-top: 3px; display: none; }

    .btn { padding: 8px 16px; border-radius: 4px; font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; letter-spacing: 0.03em; }
    .btn-block { width: 100%; margin-top: 16px; padding: 10px; font-size: 13px; }
    .btn-solid { background: var(--text); color: var(--bg); border-color: var(--text); }
    .btn-solid:hover { background: #c8c8ca; }
    .btn-solid:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; border-color: var(--border2); }
    .btn-ghost { background: transparent; color: var(--muted2); border-color: var(--border); }
    .btn-ghost:hover { border-color: var(--border2); color: var(--text); }

    /* SUCESSO */
    .sucesso { display: none; padding: 2rem 1rem; text-align: center; }
    .sucesso-icon { width: 36px; height: 36px; border-radius: 50%; background: var(--bg3); border: 1px solid var(--green); display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
    .sucesso-icon svg { width: 16px; height: 16px; stroke: var(--green); fill: none; stroke-width: 2; }
    .sucesso h2 { font-size: 15px; font-weight: 500; margin-bottom: 6px; }
    .sucesso p { font-size: 12px; color: var(--muted2); line-height: 1.6; }
    .sucesso .btn { margin-top: 14px; }

    /* FILTROS */
    .filtros { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filtros input, .filtros select {
      padding: 7px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px;
      color: var(--text); font-family: var(--sans); font-size: 12px; outline: none;
    }
    .filtros input { flex: 1; min-width: 160px; }
    .filtros select option { background: var(--bg3); }

    /* CARDS CHAMADO */
    .chamado-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; margin-bottom: 6px; transition: border-color 0.15s; }
    .chamado-card:hover { border-color: var(--border2); }
    .chamado-card.finalizado-card { border-left: 2px solid var(--green); }
    .chamado-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .chamado-nome { font-size: 13px; font-weight: 500; color: var(--text); }
    .chamado-empresa { font-size: 11px; color: var(--muted2); margin-top: 1px; }
    .chamado-data { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
    .chamado-previsao { font-family: var(--mono); font-size: 10px; color: var(--muted2); margin-top: 2px; }
    .badge { padding: 2px 8px; border-radius: 2px; font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.05em; }
    .badge-aberto { background: rgba(79,127,255,0.12); color: var(--blue); border: 1px solid rgba(79,127,255,0.25); }
    .badge-trabalhando { background: rgba(212,160,23,0.12); color: var(--amber); border: 1px solid rgba(212,160,23,0.25); }
    .badge-finalizado { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .chamado-desc { font-size: 12px; color: var(--muted2); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.6; }
    .obs-bloco { margin-top: 8px; padding: 7px 10px; background: rgba(212,160,23,0.06); border-left: 2px solid var(--amber); font-size: 11px; color: var(--muted2); line-height: 1.5; }
    .obs-label { font-family: var(--mono); font-size: 10px; color: var(--amber); margin-bottom: 2px; }

    /* AVISOS */
    .aviso-card { background: var(--bg2); border: 1px solid rgba(212,160,23,0.3); border-left: 2px solid var(--amber); border-radius: 4px; padding: 12px 14px; margin-bottom: 6px; }
    .aviso-titulo { font-size: 13px; font-weight: 500; color: var(--text); }
    .aviso-desc { font-size: 12px; color: var(--muted2); margin-top: 5px; line-height: 1.6; }
    .aviso-data { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 6px; }
    .avisos-header { display: flex; align-items: center; gap: 8px; margin-bottom: 14px; }
    .avisos-header-label { font-family: var(--mono); font-size: 10px; color: var(--amber); letter-spacing: 0.08em; text-transform: uppercase; }
    .dot-amber { width: 6px; height: 6px; background: var(--amber); border-radius: 50%; animation: pulse 1.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .lista-vazia { padding: 2rem; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .carregando { padding: 2rem; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">TI / <span>Suporte</span></div>
</div>

<div class="nav">
  <button class="nav-btn ativo" onclick="mudarAba('abrir', this)">Novo chamado</button>
  <button class="nav-btn" onclick="mudarAba('ver', this)">Em aberto</button>
  <button class="nav-btn" onclick="mudarAba('finalizados', this)">Finalizados</button>
  <button class="nav-btn avisos-btn" onclick="mudarAba('avisos', this)">Avisos</button>
</div>

<!-- ABA: ABRIR -->
<div id="aba-abrir">
  <div class="content">
    <div id="formulario">
      <div class="section-label" style="margin-top:4px;">Novo chamado</div>
      <div class="field">
        <label>Nome</label>
        <input type="text" id="nome" placeholder="Seu nome completo" />
        <div class="field-erro" id="erro-nome">Campo obrigatório.</div>
      </div>
      <div class="field">
        <label>Empresa</label>
        <select id="empresa">
          <option value="">Selecione...</option>
          <option>Marca Couros</option>
          <option>SMX Dourados</option>
          <option>SMX Manaus</option>
          <option>Berseba</option>
        </select>
        <div class="field-erro" id="erro-empresa">Campo obrigatório.</div>
      </div>
      <div class="field">
        <label>Descrição do problema</label>
        <textarea id="descricao" placeholder="Descreva o que está acontecendo..."></textarea>
        <div class="field-erro" id="erro-descricao">Campo obrigatório.</div>
      </div>
      <button class="btn btn-solid btn-block" id="btn-enviar" onclick="enviarChamado()">Enviar chamado</button>
    </div>
    <div class="sucesso" id="sucesso">
      <div class="sucesso-icon">
        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
      </div>
      <h2>Chamado registrado</h2>
      <p>Seu pedido foi enviado.<br>Acompanhe o status em <strong>Em aberto</strong>.</p>
      <button class="btn btn-ghost" onclick="novoChamado()">Novo chamado</button>
    </div>
  </div>
</div>

<!-- ABA: EM ABERTO -->
<div id="aba-ver" style="display:none;">
  <div class="content wide">
    <div class="filtros">
      <input type="text" id="busca-ver" placeholder="Buscar por nome ou empresa..." oninput="filtrarAtivos()" />
      <select id="filtro-empresa-ver" onchange="filtrarAtivos()">
        <option value="">Todas as empresas</option>
        <option>Marca Couros</option>
        <option>SMX Dourados</option>
        <option>SMX Manaus</option>
        <option>Berseba</option>
      </select>
    </div>
    <div id="lista-ativos"><div class="carregando">carregando...</div></div>
  </div>
</div>

<!-- ABA: FINALIZADOS -->
<div id="aba-finalizados" style="display:none;">
  <div class="content wide">
    <div class="filtros">
      <input type="text" id="busca-fin" placeholder="Buscar por nome ou empresa..." oninput="filtrarFinalizados()" />
      <select id="filtro-empresa-fin" onchange="filtrarFinalizados()">
        <option value="">Todas as empresas</option>
        <option>Marca Couros</option>
        <option>SMX Dourados</option>
        <option>SMX Manaus</option>
        <option>Berseba</option>
      </select>
    </div>
    <div id="lista-finalizados"><div class="carregando">carregando...</div></div>
  </div>
</div>

<!-- ABA: AVISOS -->
<div id="aba-avisos" style="display:none;">
  <div class="content wide">
    <div class="avisos-header">
      <div class="dot-amber"></div>
      <span class="avisos-header-label">Avisos do TI</span>
    </div>
    <div id="lista-avisos"><div class="carregando">carregando...</div></div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, where } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-_IbnqRoaFSrQ-56vF3z87p3zyRr1rw0",
    authDomain: "chamados-ti-18409.firebaseapp.com",
    projectId: "chamados-ti-18409",
    storageBucket: "chamados-ti-18409.firebasestorage.app",
    messagingSenderId: "261416236280",
    appId: "1:261416236280:web:4f3e26833e9fe14d9bb70d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const statusLabel = { aberto: 'Aberto', trabalhando: 'Em andamento', finalizado: 'Finalizado' };
  let todosAtivos = [], todosFinalizados = [], todosAvisos = [];

  const qAtivos = query(collection(db, 'chamados'), where('status', '!=', 'finalizado'), orderBy('status'), orderBy('criadoEm', 'desc'));
  onSnapshot(qAtivos, snap => { todosAtivos = snap.docs.map(d => ({ id: d.id, ...d.data() })); filtrarAtivos(); });

  const qFin = query(collection(db, 'chamados'), where('status', '==', 'finalizado'), orderBy('criadoEm', 'desc'));
  onSnapshot(qFin, snap => { todosFinalizados = snap.docs.map(d => ({ id: d.id, ...d.data() })); filtrarFinalizados(); });

  const qAvisos = query(collection(db, 'avisos'), orderBy('criadoEm', 'desc'));
  onSnapshot(qAvisos, snap => { todosAvisos = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderizarAvisos(); });

  function fmtData(c) { return c.criadoEm ? new Date(c.criadoEm.seconds * 1000).toLocaleString('pt-BR') : '—'; }

  function cardHtml(c, finalizado = false) {
    return `
      <div class="chamado-card ${finalizado ? 'finalizado-card' : ''}">
        <div class="chamado-row">
          <div>
            <div class="chamado-nome">${c.nome}</div>
            <div class="chamado-empresa">${c.empresa}</div>
            <div class="chamado-data">${fmtData(c)}</div>
            ${c.previsao ? `<div class="chamado-previsao">Previsao: ${c.previsao}</div>` : ''}
          </div>
          <span class="badge badge-${c.status}">${statusLabel[c.status]}</span>
        </div>
        <div class="chamado-desc">${c.descricao}</div>
        ${c.observacao ? `<div class="obs-bloco"><div class="obs-label">OBS. TI</div>${c.observacao}</div>` : ''}
      </div>`;
  }

  window.filtrarAtivos = function() {
    const busca = document.getElementById('busca-ver').value.toLowerCase();
    const emp = document.getElementById('filtro-empresa-ver').value;
    let lista = todosAtivos;
    if (busca) lista = lista.filter(c => c.nome.toLowerCase().includes(busca) || c.empresa.toLowerCase().includes(busca));
    if (emp) lista = lista.filter(c => c.empresa === emp);
    const el = document.getElementById('lista-ativos');
    el.innerHTML = lista.length === 0 ? '<div class="lista-vazia">nenhum chamado ativo</div>' : lista.map(c => cardHtml(c)).join('');
  }

  window.filtrarFinalizados = function() {
    const busca = document.getElementById('busca-fin').value.toLowerCase();
    const emp = document.getElementById('filtro-empresa-fin').value;
    let lista = todosFinalizados;
    if (busca) lista = lista.filter(c => c.nome.toLowerCase().includes(busca) || c.empresa.toLowerCase().includes(busca));
    if (emp) lista = lista.filter(c => c.empresa === emp);
    const el = document.getElementById('lista-finalizados');
    el.innerHTML = lista.length === 0 ? '<div class="lista-vazia">nenhum chamado finalizado</div>' : lista.map(c => cardHtml(c, true)).join('');
  }

  function renderizarAvisos() {
    const el = document.getElementById('lista-avisos');
    el.innerHTML = todosAvisos.length === 0
      ? '<div class="lista-vazia">nenhum aviso no momento</div>'
      : todosAvisos.map(a => {
          const data = a.criadoEm ? new Date(a.criadoEm.seconds * 1000).toLocaleString('pt-BR') : '—';
          return `<div class="aviso-card">
            <div class="aviso-titulo">${a.titulo}</div>
            <div class="aviso-desc">${a.descricao}</div>
            <div class="aviso-data">${data}</div>
          </div>`;
        }).join('');
  }

  window.enviarChamado = async function() {
    const nome = document.getElementById('nome').value.trim();
    const empresa = document.getElementById('empresa').value;
    const descricao = document.getElementById('descricao').value.trim();
    document.getElementById('erro-nome').style.display = !nome ? 'block' : 'none';
    document.getElementById('erro-empresa').style.display = !empresa ? 'block' : 'none';
    document.getElementById('erro-descricao').style.display = !descricao ? 'block' : 'none';
    if (!nome || !empresa || !descricao) return;
    const btn = document.getElementById('btn-enviar');
    btn.disabled = true; btn.textContent = 'Enviando...';
    try {
      await addDoc(collection(db, 'chamados'), {
        nome, empresa, descricao, status: 'aberto', previsao: '', observacao: '',
        criadoEm: { seconds: Math.floor(Date.now() / 1000) }
      });
      document.getElementById('formulario').style.display = 'none';
      document.getElementById('sucesso').style.display = 'block';
    } catch(e) { alert('Erro ao enviar. Tente novamente.'); }
    finally { btn.disabled = false; btn.textContent = 'Enviar chamado'; }
  }

  window.novoChamado = function() {
    document.getElementById('formulario').style.display = 'block';
    document.getElementById('sucesso').style.display = 'none';
    document.getElementById('nome').value = '';
    document.getElementById('empresa').value = '';
    document.getElementById('descricao').value = '';
  }

  window.mudarAba = function(aba, el) {
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('ativo'));
    el.classList.add('ativo');
    document.getElementById('aba-abrir').style.display = aba === 'abrir' ? 'block' : 'none';
    document.getElementById('aba-ver').style.display = aba === 'ver' ? 'block' : 'none';
    document.getElementById('aba-finalizados').style.display = aba === 'finalizados' ? 'block' : 'none';
    document.getElementById('aba-avisos').style.display = aba === 'avisos' ? 'block' : 'none';
  }
</script>
</body>
</html>
