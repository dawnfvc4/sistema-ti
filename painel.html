<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel TI</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:      #0e0e10;
      --bg2:     #141416;
      --bg3:     #1c1c1f;
      --border:  #2a2a2e;
      --border2: #3a3a3f;
      --text:    #e8e8ea;
      --muted:   #666670;
      --muted2:  #888892;
      --accent:  #e8e8ea;
      --green:   #22c55e;
      --amber:   #d4a017;
      --blue:    #4f7fff;
      --red:     #ef4444;
      --mono:    'IBM Plex Mono', monospace;
      --sans:    'IBM Plex Sans', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 13px; }

    /* LOGIN */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-wrap { width: 320px; }
    .login-label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; }
    .login-title { font-size: 18px; font-weight: 500; color: var(--text); margin-bottom: 24px; }
    .login-field { margin-bottom: 10px; }
    .login-field label { display: block; font-size: 11px; color: var(--muted2); margin-bottom: 4px; }
    .login-field input { width: 100%; padding: 8px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; }
    .login-field input:focus { border-color: var(--border2); }
    .btn-login { width: 100%; margin-top: 16px; padding: 9px; background: var(--text); color: var(--bg); border: none; border-radius: 4px; font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; }
    .btn-login:hover { background: #c8c8ca; }
    .login-erro { font-size: 11px; color: var(--red); margin-top: 8px; display: none; font-family: var(--mono); }

    /* PAINEL */
    #painel { display: none; }
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 0 20px; height: 44px; border-bottom: 1px solid var(--border); background: var(--bg2); }
    .topbar-brand { font-family: var(--mono); font-size: 12px; color: var(--muted2); letter-spacing: 0.08em; }
    .topbar-brand span { color: var(--text); }
    .btn-sair { padding: 5px 12px; background: transparent; border: 1px solid var(--border); border-radius: 4px; color: var(--muted2); font-family: var(--sans); font-size: 11px; cursor: pointer; }
    .btn-sair:hover { border-color: var(--border2); color: var(--text); }

    /* TABS */
    .tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--bg2); padding: 0 20px; }
    .tab { padding: 10px 16px; font-size: 12px; font-weight: 500; color: var(--muted); background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; letter-spacing: 0.03em; transition: all 0.15s; white-space: nowrap; }
    .tab:hover { color: var(--text); }
    .tab.ativo { color: var(--text); border-bottom-color: var(--text); }
    .tab.tab-avisos.ativo { color: var(--amber); border-bottom-color: var(--amber); }
    .tab.tab-avisos:hover { color: var(--amber); }

    /* CONTEUDO */
    .conteudo { padding: 20px; max-width: 960px; margin: 0 auto; }

    /* FILTROS */
    .filtros { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
    .filtros input, .filtros select { padding: 7px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--sans); font-size: 12px; outline: none; }
    .filtros input { flex: 1; min-width: 160px; }
    .filtros select option { background: var(--bg3); }

    /* CARDS */
    .chamado-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 4px; padding: 12px 14px; margin-bottom: 6px; transition: border-color 0.15s; }
    .chamado-card:hover { border-color: var(--border2); }
    .chamado-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
    .chamado-nome { font-size: 13px; font-weight: 500; color: var(--text); }
    .chamado-empresa { font-size: 11px; color: var(--muted2); margin-top: 1px; }
    .chamado-data { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 2px; }
    .chamado-previsao { font-family: var(--mono); font-size: 10px; color: var(--muted2); margin-top: 2px; }
    .badge { padding: 2px 8px; border-radius: 2px; font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.05em; white-space: nowrap; }
    .badge-aberto { background: rgba(79,127,255,0.12); color: var(--blue); border: 1px solid rgba(79,127,255,0.25); }
    .badge-trabalhando { background: rgba(212,160,23,0.12); color: var(--amber); border: 1px solid rgba(212,160,23,0.25); }
    .badge-finalizado { background: rgba(34,197,94,0.1); color: var(--green); border: 1px solid rgba(34,197,94,0.2); }
    .chamado-desc { font-size: 12px; color: var(--muted2); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); line-height: 1.6; }
    .obs-bloco { margin-top: 8px; padding: 7px 10px; background: rgba(212,160,23,0.06); border-left: 2px solid var(--amber); font-size: 11px; color: var(--muted2); line-height: 1.5; }
    .obs-label { font-family: var(--mono); font-size: 10px; color: var(--amber); margin-bottom: 2px; }

    /* AÇÕES */
    .chamado-acoes { margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
    .campo-acao { display: flex; flex-direction: column; gap: 3px; flex: 1; min-width: 120px; }
    .campo-acao label { font-size: 10px; color: var(--muted); font-family: var(--mono); letter-spacing: 0.05em; text-transform: uppercase; }
    .campo-acao select, .campo-acao input, .campo-acao textarea { padding: 6px 9px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--sans); font-size: 12px; outline: none; width: 100%; }
    .campo-acao select option { background: var(--bg3); }
    .campo-acao textarea { min-height: 56px; resize: vertical; }
    .acoes-btns { display: flex; gap: 6px; }
    .btn-salvar { padding: 7px 14px; background: var(--text); color: var(--bg); border: none; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; white-space: nowrap; font-family: var(--sans); }
    .btn-salvar:hover { background: #c8c8ca; }
    .btn-salvar:disabled { background: var(--border2); color: var(--muted); cursor: not-allowed; }
    .btn-excluir-chamado { padding: 7px 14px; background: transparent; border: 1px solid var(--border); border-radius: 4px; font-size: 12px; color: var(--red); cursor: pointer; white-space: nowrap; font-family: var(--sans); }
    .btn-excluir-chamado:hover { border-color: var(--red); background: rgba(239,68,68,0.06); }

    /* AVISOS */
    .aviso-form { background: var(--bg2); border: 1px solid rgba(212,160,23,0.25); border-radius: 4px; padding: 14px; margin-bottom: 16px; }
    .aviso-form-label { font-family: var(--mono); font-size: 10px; color: var(--amber); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 12px; }
    .aviso-form input, .aviso-form textarea { width: 100%; padding: 7px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; color: var(--text); font-family: var(--sans); font-size: 12px; outline: none; margin-bottom: 8px; }
    .aviso-form textarea { min-height: 72px; resize: vertical; }
    .btn-aviso { padding: 7px 16px; background: var(--amber); color: var(--bg); border: none; border-radius: 4px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: var(--sans); }
    .btn-aviso:hover { background: #c49010; }
    .aviso-card { background: var(--bg2); border: 1px solid rgba(212,160,23,0.2); border-left: 2px solid var(--amber); border-radius: 4px; padding: 12px 14px; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
    .aviso-corpo { flex: 1; }
    .aviso-titulo-txt { font-size: 13px; font-weight: 500; color: var(--text); }
    .aviso-desc-txt { font-size: 12px; color: var(--muted2); margin-top: 4px; line-height: 1.6; }
    .aviso-data-txt { font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 6px; }
    .btn-excluir-aviso { padding: 4px 10px; background: transparent; border: 1px solid var(--border); border-radius: 4px; font-size: 11px; color: var(--muted); cursor: pointer; white-space: nowrap; font-family: var(--sans); }
    .btn-excluir-aviso:hover { border-color: var(--red); color: var(--red); }

    .lista-vazia { padding: 2rem; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .carregando { padding: 2rem; text-align: center; font-family: var(--mono); font-size: 11px; color: var(--muted); }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-wrap">
    <div class="login-label">Sistema de Chamados</div>
    <div class="login-title">Acesso ao painel TI</div>
    <div class="login-field">
      <label>Usuário</label>
      <input type="text" id="usuario" placeholder="usuario" />
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter') fazerLogin()" />
    </div>
    <button class="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="login-erro" id="login-erro">credenciais incorretas</div>
  </div>
</div>

<!-- PAINEL -->
<div id="painel">
  <div class="topbar">
    <div class="topbar-brand">TI / <span>Painel</span></div>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>

  <div class="tabs">
    <div class="tab ativo" onclick="mudarAba('abertos', this)">Abertos</div>
    <div class="tab" onclick="mudarAba('andamento', this)">Em andamento</div>
    <div class="tab" onclick="mudarAba('finalizados', this)">Finalizados</div>
    <div class="tab tab-avisos" onclick="mudarAba('avisos', this)">Avisos</div>
  </div>

  <div class="conteudo">
    <div id="conteudo-chamados">
      <div class="filtros">
        <input type="text" id="busca" placeholder="Buscar por nome ou empresa..." oninput="filtrarChamados()" />
        <select id="filtro-empresa" onchange="filtrarChamados()">
          <option value="">Todas as empresas</option>
          <option>Marca Couros</option>
          <option>SMX Dourados</option>
          <option>SMX Manaus</option>
          <option>Berseba</option>
        </select>
      </div>
      <div id="lista-chamados"><div class="carregando">carregando...</div></div>
    </div>

    <div id="conteudo-avisos" style="display:none;">
      <div class="aviso-form">
        <div class="aviso-form-label">Publicar aviso</div>
        <input type="text" id="aviso-titulo" placeholder="Título..." />
        <textarea id="aviso-desc" placeholder="Descrição..."></textarea>
        <button class="btn-aviso" onclick="publicarAviso()">Publicar</button>
      </div>
      <div id="lista-avisos-painel"><div class="carregando">carregando...</div></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-_IbnqRoaFSrQ-56vF3z87p3zyRr1rw0",
    authDomain: "chamados-ti-18409.firebaseapp.com",
    projectId: "chamados-ti-18409",
    storageBucket: "chamados-ti-18409.firebasestorage.app",
    messagingSenderId: "261416236280",
    appId: "1:261416236280:web:4f3e26833e9fe14d9bb70d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const USUARIO = 'admin', SENHA = 'ti2024';
  let abaAtual = 'abertos', todosChamados = [], todosAvisos = [];
  const statusLabel = { aberto: 'Aberto', trabalhando: 'Em andamento', finalizado: 'Finalizado' };

  const qChamados = query(collection(db, 'chamados'), orderBy('criadoEm', 'desc'));
  onSnapshot(qChamados, snap => { todosChamados = snap.docs.map(d => ({ id: d.id, ...d.data() })); filtrarChamados(); });

  const qAvisos = query(collection(db, 'avisos'), orderBy('criadoEm', 'desc'));
  onSnapshot(qAvisos, snap => { todosAvisos = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderizarAvisos(); });

  window.fazerLogin = function() {
    const u = document.getElementById('usuario').value.trim();
    const s = document.getElementById('senha').value;
    if (u === USUARIO && s === SENHA) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('painel').style.display = 'block';
    } else {
      document.getElementById('login-erro').style.display = 'block';
    }
  }

  window.sair = function() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('painel').style.display = 'none';
    document.getElementById('usuario').value = '';
    document.getElementById('senha').value = '';
  }

  window.mudarAba = function(aba, el) {
    abaAtual = aba;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
    el.classList.add('ativo');
    const ehAviso = aba === 'avisos';
    document.getElementById('conteudo-chamados').style.display = ehAviso ? 'none' : 'block';
    document.getElementById('conteudo-avisos').style.display = ehAviso ? 'block' : 'none';
    if (!ehAviso) filtrarChamados();
  }

  window.filtrarChamados = function() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const emp = document.getElementById('filtro-empresa').value;
    let lista = todosChamados;
    if (abaAtual === 'abertos') lista = lista.filter(c => c.status === 'aberto');
    else if (abaAtual === 'andamento') lista = lista.filter(c => c.status === 'trabalhando');
    else if (abaAtual === 'finalizados') lista = lista.filter(c => c.status === 'finalizado');
    if (busca) lista = lista.filter(c => c.nome.toLowerCase().includes(busca) || c.empresa.toLowerCase().includes(busca));
    if (emp) lista = lista.filter(c => c.empresa === emp);
    const el = document.getElementById('lista-chamados');
    if (lista.length === 0) { el.innerHTML = '<div class="lista-vazia">nenhum chamado encontrado</div>'; return; }

    el.innerHTML = lista.map(c => {
      const data = c.criadoEm ? new Date(c.criadoEm.seconds * 1000).toLocaleString('pt-BR') : '—';
      return `
        <div class="chamado-card">
          <div class="chamado-row">
            <div>
              <div class="chamado-nome">${c.nome}</div>
              <div class="chamado-empresa">${c.empresa}</div>
              <div class="chamado-data">${data}</div>
              ${c.previsao ? `<div class="chamado-previsao">Previsao: ${c.previsao}</div>` : ''}
            </div>
            <span class="badge badge-${c.status}">${statusLabel[c.status]}</span>
          </div>
          <div class="chamado-desc">${c.descricao}</div>
          ${c.observacao ? `<div class="obs-bloco"><div class="obs-label">OBS. TI</div>${c.observacao}</div>` : ''}
          <div class="chamado-acoes">
            <div class="campo-acao">
              <label>Status</label>
              <select id="status-${c.id}">
                <option value="aberto" ${c.status==='aberto'?'selected':''}>Aberto</option>
                <option value="trabalhando" ${c.status==='trabalhando'?'selected':''}>Trabalhando</option>
                <option value="finalizado" ${c.status==='finalizado'?'selected':''}>Finalizado</option>
              </select>
            </div>
            <div class="campo-acao">
              <label>Previsao</label>
              <input type="text" id="prev-${c.id}" value="${c.previsao || ''}" placeholder="Ex: 27/04 14h" />
            </div>
            <div class="campo-acao" style="flex:2;min-width:180px;">
              <label>Observacao</label>
              <textarea id="obs-${c.id}" placeholder="Adicione uma observacao...">${c.observacao || ''}</textarea>
            </div>
            <div class="acoes-btns">
              <button class="btn-salvar" onclick="salvar('${c.id}')">Salvar</button>
              <button class="btn-excluir-chamado" onclick="excluirChamado('${c.id}')">Excluir</button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  window.salvar = async function(id) {
    const btn = event.target;
    btn.textContent = '...'; btn.disabled = true;
    try {
      await updateDoc(doc(db, 'chamados', id), {
        status: document.getElementById('status-' + id).value,
        previsao: document.getElementById('prev-' + id).value,
        observacao: document.getElementById('obs-' + id).value
      });
    } catch(e) { alert('Erro ao salvar.'); }
    finally { btn.textContent = 'Salvar'; btn.disabled = false; }
  }

  window.excluirChamado = async function(id) {
    if (!confirm('Excluir este chamado? Essa ação não pode ser desfeita.')) return;
    try { await deleteDoc(doc(db, 'chamados', id)); }
    catch(e) { alert('Erro ao excluir.'); }
  }

  window.publicarAviso = async function() {
    const titulo = document.getElementById('aviso-titulo').value.trim();
    const descricao = document.getElementById('aviso-desc').value.trim();
    if (!titulo || !descricao) { alert('Preencha título e descrição.'); return; }
    try {
      await addDoc(collection(db, 'avisos'), { titulo, descricao, criadoEm: serverTimestamp() });
      document.getElementById('aviso-titulo').value = '';
      document.getElementById('aviso-desc').value = '';
    } catch(e) { alert('Erro ao publicar aviso.'); }
  }

  window.excluirAviso = async function(id) {
    if (!confirm('Excluir este aviso?')) return;
    try { await deleteDoc(doc(db, 'avisos', id)); }
    catch(e) { alert('Erro ao excluir aviso.'); }
  }

  function renderizarAvisos() {
    const el = document.getElementById('lista-avisos-painel');
    el.innerHTML = todosAvisos.length === 0
      ? '<div class="lista-vazia">nenhum aviso publicado</div>'
      : todosAvisos.map(a => {
          const data = a.criadoEm ? new Date(a.criadoEm.seconds * 1000).toLocaleString('pt-BR') : '—';
          return `
            <div class="aviso-card">
              <div class="aviso-corpo">
                <div class="aviso-titulo-txt">${a.titulo}</div>
                <div class="aviso-desc-txt">${a.descricao}</div>
                <div class="aviso-data-txt">${data}</div>
              </div>
              <button class="btn-excluir-aviso" onclick="excluirAviso('${a.id}')">Excluir</button>
            </div>`;
        }).join('');
  }
</script>
</body>
</html>
