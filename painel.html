<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel TI</title>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:        #f7f7f8;
      --surface:   #ffffff;
      --surface2:  #f2f2f4;
      --border:    #e4e4e8;
      --border2:   #d0d0d6;
      --text:      #111114;
      --text2:     #5a5a6a;
      --text3:     #9a9aaa;
      --green:     #16a34a;
      --green-bg:  #f0fdf4;
      --green-b:   #bbf7d0;
      --amber:     #b45309;
      --amber-bg:  #fffbeb;
      --amber-b:   #fde68a;
      --blue:      #1d4ed8;
      --blue-bg:   #eff6ff;
      --blue-b:    #bfdbfe;
      --red:       #dc2626;
      --red-bg:    #fef2f2;
      --red-b:     #fecaca;
      --sans:      'Geist', sans-serif;
      --mono:      'Geist Mono', monospace;
      --radius:    8px;
      --radius-lg: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; font-size: 14px; -webkit-font-smoothing: antialiased; }

    /* LOGIN */
    #login-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 36px; width: 100%; max-width: 360px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .login-icon { width: 40px; height: 40px; background: var(--text); border-radius: var(--radius); display: flex; align-items: center; justify-content: center; margin-bottom: 20px; }
    .login-icon svg { width: 20px; height: 20px; stroke: white; fill: none; stroke-width: 2; }
    .login-title { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .login-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; }
    .login-field { margin-bottom: 12px; }
    .login-field label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
    .login-field input { width: 100%; padding: 9px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color 0.15s, box-shadow 0.15s; }
    .login-field input:focus { border-color: var(--border2); box-shadow: 0 0 0 3px rgba(17,17,20,0.06); }
    .btn-login { width: 100%; margin-top: 8px; padding: 10px; background: var(--text); color: white; border: none; border-radius: var(--radius); font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; }
    .btn-login svg { width: 14px; height: 14px; stroke: white; fill: none; stroke-width: 2; }
    .btn-login:hover { background: #2a2a30; }
    .login-erro { font-size: 12px; color: var(--red); margin-top: 10px; display: none; background: var(--red-bg); border: 1px solid var(--red-b); border-radius: var(--radius); padding: 8px 12px; }

    /* PAINEL */
    #painel { display: none; }
    .topbar { height: 52px; background: var(--surface); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 24px; position: sticky; top: 0; z-index: 10; }
    .topbar-left { display: flex; align-items: center; gap: 10px; }
    .topbar-icon { width: 28px; height: 28px; background: var(--text); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
    .topbar-icon svg { width: 15px; height: 15px; stroke: white; fill: none; stroke-width: 2; }
    .topbar-title { font-size: 14px; font-weight: 600; }
    .btn-sair { display: flex; align-items: center; gap: 5px; padding: 6px 12px; background: white; border: 1px solid var(--border); border-radius: var(--radius); font-family: var(--sans); font-size: 12px; font-weight: 500; color: var(--text2); cursor: pointer; transition: all 0.15s; }
    .btn-sair svg { width: 13px; height: 13px; stroke: var(--text2); fill: none; stroke-width: 2; }
    .btn-sair:hover { border-color: var(--border2); color: var(--text); }

    /* TABS */
    .tabs { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; display: flex; overflow-x: auto; }
    .tabs::-webkit-scrollbar { display: none; }
    .tab { display: flex; align-items: center; gap: 6px; padding: 12px 16px; font-size: 13px; font-weight: 500; color: var(--text2); background: transparent; border: none; border-bottom: 2px solid transparent; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
    .tab svg { width: 14px; height: 14px; stroke: currentColor; fill: none; stroke-width: 1.75; flex-shrink: 0; }
    .tab:hover { color: var(--text); }
    .tab.ativo { color: var(--text); border-bottom-color: var(--text); }
    .tab.tab-avisos.ativo { color: var(--amber); border-bottom-color: var(--amber); }
    .tab.tab-avisos:hover { color: var(--amber); }

    /* CONTEUDO */
    .conteudo { padding: 24px; max-width: 1000px; margin: 0 auto; }

    /* FILTROS */
    .filtros { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
    .filtros input, .filtros select { padding: 8px 12px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color 0.15s; }
    .filtros input:focus, .filtros select:focus { border-color: var(--border2); }
    .filtros input { flex: 1; min-width: 160px; }

    /* CARDS */
    .chamado-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 8px; transition: box-shadow 0.15s; }
    .chamado-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .chamado-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .chamado-info { flex: 1; }
    .chamado-nome { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
    .chamado-nome svg { width: 13px; height: 13px; stroke: var(--text3); fill: none; stroke-width: 1.75; flex-shrink: 0; }
    .chamado-empresa { font-size: 12px; color: var(--text2); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
    .chamado-empresa svg { width: 11px; height: 11px; stroke: var(--text3); fill: none; stroke-width: 1.75; }
    .chamado-data { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 4px; }
    .chamado-previsao { font-size: 11px; color: var(--text2); margin-top: 4px; display: flex; align-items: center; gap: 4px; }
    .chamado-previsao svg { width: 11px; height: 11px; stroke: var(--text2); fill: none; stroke-width: 1.75; }
    .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 20px; font-size: 11px; font-weight: 500; border: 1px solid; white-space: nowrap; }
    .badge svg { width: 10px; height: 10px; stroke: currentColor; fill: none; stroke-width: 2; }
    .badge-aberto { background: var(--blue-bg); color: var(--blue); border-color: var(--blue-b); }
    .badge-trabalhando { background: var(--amber-bg); color: var(--amber); border-color: var(--amber-b); }
    .badge-finalizado { background: var(--green-bg); color: var(--green); border-color: var(--green-b); }
    .chamado-desc { font-size: 13px; color: var(--text2); margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); line-height: 1.65; }
    .obs-bloco { margin-top: 10px; padding: 10px 12px; background: var(--amber-bg); border: 1px solid var(--amber-b); border-radius: var(--radius); }
    .obs-label { font-size: 10px; font-weight: 600; color: var(--amber); letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 3px; display: flex; align-items: center; gap: 4px; }
    .obs-label svg { width: 10px; height: 10px; stroke: var(--amber); fill: none; stroke-width: 2; }
    .obs-texto { font-size: 12px; color: var(--text2); line-height: 1.55; }

    /* AÇÕES */
    .chamado-acoes { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: flex; flex-wrap: wrap; gap: 8px; align-items: flex-end; }
    .campo-acao { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 120px; }
    .campo-acao label { font-size: 11px; font-weight: 500; color: var(--text2); }
    .campo-acao select, .campo-acao input, .campo-acao textarea { padding: 7px 10px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--sans); font-size: 12px; outline: none; width: 100%; transition: border-color 0.15s; }
    .campo-acao select:focus, .campo-acao input:focus, .campo-acao textarea:focus { border-color: var(--border2); }
    .campo-acao textarea { min-height: 56px; resize: vertical; }
    .acoes-btns { display: flex; gap: 6px; align-self: flex-end; }
    .btn { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: var(--radius); font-family: var(--sans); font-size: 12px; font-weight: 500; cursor: pointer; transition: all 0.15s; border: 1px solid transparent; white-space: nowrap; }
    .btn svg { width: 13px; height: 13px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; }
    .btn-primary { background: var(--text); color: white; border-color: var(--text); }
    .btn-primary:hover { background: #2a2a30; }
    .btn-primary:disabled { background: var(--border2); color: var(--text3); border-color: var(--border2); cursor: not-allowed; }
    .btn-outline { background: white; color: var(--text2); border-color: var(--border); }
    .btn-outline:hover { border-color: var(--border2); color: var(--text); }
    .btn-danger { background: white; color: var(--red); border-color: var(--border); }
    .btn-danger:hover { background: var(--red-bg); border-color: var(--red-b); }
    .btn-amber { background: var(--amber); color: white; border-color: var(--amber); }
    .btn-amber:hover { background: #9a4508; }

    /* AVISOS */
    .aviso-form { background: var(--surface); border: 1px solid var(--amber-b); border-radius: var(--radius-lg); padding: 20px; margin-bottom: 16px; }
    .aviso-form-title { font-size: 13px; font-weight: 600; margin-bottom: 14px; display: flex; align-items: center; gap: 6px; }
    .aviso-form-title svg { width: 14px; height: 14px; stroke: var(--amber); fill: none; stroke-width: 1.75; }
    .aviso-form input, .aviso-form textarea { width: 100%; padding: 8px 12px; background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; margin-bottom: 8px; transition: border-color 0.15s; }
    .aviso-form input:focus, .aviso-form textarea:focus { border-color: var(--border2); }
    .aviso-form textarea { min-height: 72px; resize: vertical; }
    .aviso-card { background: var(--surface); border: 1px solid var(--border); border-left: 3px solid var(--amber); border-radius: var(--radius-lg); padding: 14px 16px; margin-bottom: 8px; display: flex; align-items: flex-start; gap: 12px; transition: box-shadow 0.15s; }
    .aviso-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
    .aviso-card-icon { width: 32px; height: 32px; border-radius: var(--radius); background: var(--amber-bg); border: 1px solid var(--amber-b); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .aviso-card-icon svg { width: 15px; height: 15px; stroke: var(--amber); fill: none; stroke-width: 1.75; }
    .aviso-corpo { flex: 1; }
    .aviso-titulo-txt { font-size: 13px; font-weight: 600; }
    .aviso-desc-txt { font-size: 12px; color: var(--text2); margin-top: 4px; line-height: 1.6; }
    .aviso-data-txt { font-family: var(--mono); font-size: 11px; color: var(--text3); margin-top: 6px; }

    .lista-vazia { padding: 48px 20px; text-align: center; color: var(--text3); font-size: 13px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .lista-vazia svg { width: 32px; height: 32px; stroke: var(--border2); fill: none; stroke-width: 1.5; }
    .carregando { padding: 48px 20px; text-align: center; color: var(--text3); font-size: 13px; }

    .dot { width: 7px; height: 7px; background: var(--amber); border-radius: 50%; animation: pulse 1.8s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
    .avisos-topo { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
    .avisos-topo svg { width: 15px; height: 15px; stroke: var(--amber); fill: none; stroke-width: 1.75; }
    .avisos-topo-label { font-size: 13px; font-weight: 600; }
  </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-icon">
      <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
    </div>
    <div class="login-title">Painel TI</div>
    <div class="login-sub">Acesso restrito à equipe de TI</div>
    <div class="login-field">
      <label>Usuário</label>
      <input type="text" id="usuario" placeholder="Digite o usuário" />
    </div>
    <div class="login-field">
      <label>Senha</label>
      <input type="password" id="senha" placeholder="••••••••" onkeydown="if(event.key==='Enter') fazerLogin()" />
    </div>
    <button class="btn-login" onclick="fazerLogin()">
      <svg viewBox="0 0 24 24"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
      Entrar
    </button>
    <div class="login-erro" id="login-erro">Usuário ou senha incorretos.</div>
  </div>
</div>

<!-- PAINEL -->
<div id="painel">
  <div class="topbar">
    <div class="topbar-left">
      <div class="topbar-icon">
        <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
      </div>
      <span class="topbar-title">Painel TI</span>
    </div>
    <button class="btn-sair" onclick="sair()">
      <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      Sair
    </button>
  </div>

  <div class="tabs">
    <div class="tab ativo" onclick="mudarAba('abertos', this)">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Abertos
    </div>
    <div class="tab" onclick="mudarAba('andamento', this)">
      <svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
      Em andamento
    </div>
    <div class="tab" onclick="mudarAba('finalizados', this)">
      <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Finalizados
    </div>
    <div class="tab tab-avisos" onclick="mudarAba('avisos', this)">
      <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      Avisos
    </div>
  </div>

  <div class="conteudo">
    <div id="conteudo-chamados">
      <div class="filtros">
        <input type="text" id="busca" placeholder="Buscar por nome ou empresa..." oninput="filtrarChamados()" />
        <select id="filtro-empresa" onchange="filtrarChamados()">
          <option value="">Todas as empresas</option>
          <option>Marca Couros</option>
          <option>SMX Dourados</option>
          <option>SMX Manaus</option>
          <option>Berseba</option>
        </select>
      </div>
      <div id="lista-chamados"><div class="carregando">Carregando chamados...</div></div>
    </div>

    <div id="conteudo-avisos" style="display:none;">
      <div class="aviso-form">
        <div class="aviso-form-title">
          <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
          Publicar novo aviso
        </div>
        <input type="text" id="aviso-titulo" placeholder="Título do aviso..." />
        <textarea id="aviso-desc" placeholder="Descreva o aviso ou tarefa..."></textarea>
        <button class="btn btn-amber" onclick="publicarAviso()">
          <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          Publicar
        </button>
      </div>
      <div class="avisos-topo">
        <div class="dot"></div>
        <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        <span class="avisos-topo-label">Avisos publicados</span>
      </div>
      <div id="lista-avisos-painel"><div class="carregando">Carregando...</div></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB-_IbnqRoaFSrQ-56vF3z87p3zyRr1rw0",
    authDomain: "chamados-ti-18409.firebaseapp.com",
    projectId: "chamados-ti-18409",
    storageBucket: "chamados-ti-18409.firebasestorage.app",
    messagingSenderId: "261416236280",
    appId: "1:261416236280:web:4f3e26833e9fe14d9bb70d"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const USUARIO = 'admin', SENHA = 'ti2024';
  let abaAtual = 'abertos', todosChamados = [], todosAvisos = [];

  const statusLabel = { aberto: 'Em aberto', trabalhando: 'Em andamento', finalizado: 'Finalizado' };
  const statusIcon = {
    aberto:      `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>`,
    trabalhando: `<svg viewBox="0 0 24 24"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>`,
    finalizado:  `<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>`
  };

  const qChamados = query(collection(db, 'chamados'), orderBy('criadoEm', 'desc'));
  onSnapshot(qChamados, snap => { todosChamados = snap.docs.map(d => ({ id: d.id, ...d.data() })); filtrarChamados(); });

  const qAvisos = query(collection(db, 'avisos'), orderBy('criadoEm', 'desc'));
  onSnapshot(qAvisos, snap => { todosAvisos = snap.docs.map(d => ({ id: d.id, ...d.data() })); renderizarAvisos(); });

  window.fazerLogin = function() {
    const u = document.getElementById('usuario').value.trim();
    const s = document.getElementById('senha').value;
    if (u === USUARIO && s === SENHA) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('painel').style.display = 'block';
    } else {
      document.getElementById('login-erro').style.display = 'block';
    }
  }

  window.sair = function() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('painel').style.display = 'none';
    document.getElementById('usuario').value = '';
    document.getElementById('senha').value = '';
  }

  window.mudarAba = function(aba, el) {
    abaAtual = aba;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('ativo'));
    el.classList.add('ativo');
    const ehAviso = aba === 'avisos';
    document.getElementById('conteudo-chamados').style.display = ehAviso ? 'none' : 'block';
    document.getElementById('conteudo-avisos').style.display = ehAviso ? 'block' : 'none';
    if (!ehAviso) filtrarChamados();
  }

  window.filtrarChamados = function() {
    const busca = document.getElementById('busca').value.toLowerCase();
    const emp = document.getElementById('filtro-empresa').value;
    let lista = todosChamados;
    if (abaAtual === 'abertos') lista = lista.filter(c => c.status === 'aberto');
    else if (abaAtual === 'andamento') lista = lista.filter(c => c.status === 'trabalhando');
    else if (abaAtual === 'finalizados') lista = lista.filter(c => c.status === 'finalizado');
    if (busca) lista = lista.filter(c => c.nome.toLowerCase().includes(busca) || c.empresa.toLowerCase().includes(busca));
    if (emp) lista = lista.filter(c => c.empresa === emp);

    const el = document.getElementById('lista-chamados');
    if (lista.length === 0) { el.innerHTML = `<div class="lista-vazia"><svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>Nenhum chamado encontrado</div>`; return; }

    el.innerHTML = lista.map(c => {
      const data = c.criadoEm ? new Date(c.criadoEm.seconds * 1000).toLocaleString('pt-BR') : '—';
      return `
        <div class="chamado-card">
          <div class="chamado-top">
            <div class="chamado-info">
              <div class="chamado-nome">
                <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                ${c.nome}
              </div>
              <div class="chamado-empresa">
                <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                ${c.empresa}
              </div>
              <div class="chamado-data">${data}</div>
              ${c.previsao ? `<div class="chamado-previsao"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>Previsão: ${c.previsao}</div>` : ''}
            </div>
            <span class="badge badge-${c.status}">${statusIcon[c.status]}${statusLabel[c.status]}</span>
          </div>
          <div class="chamado-desc">${c.descricao}</div>
          ${c.observacao ? `<div class="obs-bloco"><div class="obs-label"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>Obs. TI</div><div class="obs-texto">${c.observacao}</div></div>` : ''}
          <div class="chamado-acoes">
            <div class="campo-acao">
              <label>Status</label>
              <select id="status-${c.id}">
                <option value="aberto" ${c.status==='aberto'?'selected':''}>Aberto</option>
                <option value="trabalhando" ${c.status==='trabalhando'?'selected':''}>Trabalhando</option>
                <option value="finalizado" ${c.status==='finalizado'?'selected':''}>Finalizado</option>
              </select>
            </div>
            <div class="campo-acao">
              <label>Previsão</label>
              <input type="text" id="prev-${c.id}" value="${c.previsao || ''}" placeholder="Ex: 27/04 às 14h" />
            </div>
            <div class="campo-acao" style="flex:2;min-width:180px;">
              <label>Observação</label>
              <textarea id="obs-${c.id}" placeholder="Adicione uma observação...">${c.observacao || ''}</textarea>
            </div>
            <div class="acoes-btns">
              <button class="btn btn-primary" onclick="salvar('${c.id}')">
                <svg viewBox="0 0 24 24"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></svg>
                Salvar
              </button>
              <button class="btn btn-danger" onclick="excluirChamado('${c.id}')">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
                Excluir
              </button>
            </div>
          </div>
        </div>`;
    }).join('');
  }

  window.salvar = async function(id) {
    const btn = event.target.closest('button');
    const orig = btn.innerHTML; btn.disabled = true; btn.textContent = '...';
    try {
      await updateDoc(doc(db, 'chamados', id), {
        status: document.getElementById('status-' + id).value,
        previsao: document.getElementById('prev-' + id).value,
        observacao: document.getElementById('obs-' + id).value
      });
    } catch(e) { alert('Erro ao salvar.'); }
    finally { btn.disabled = false; btn.innerHTML = orig; }
  }

  window.excluirChamado = async function(id) {
    if (!confirm('Excluir este chamado? Essa ação não pode ser desfeita.')) return;
    try { await deleteDoc(doc(db, 'chamados', id)); }
    catch(e) { alert('Erro ao excluir.'); }
  }

  window.publicarAviso = async function() {
    const titulo = document.getElementById('aviso-titulo').value.trim();
    const descricao = document.getElementById('aviso-desc').value.trim();
    if (!titulo || !descricao) { alert('Preencha título e descrição.'); return; }
    try {
      await addDoc(collection(db, 'avisos'), { titulo, descricao, criadoEm: serverTimestamp() });
      document.getElementById('aviso-titulo').value = '';
      document.getElementById('aviso-desc').value = '';
    } catch(e) { alert('Erro ao publicar aviso.'); }
  }

  window.excluirAviso = async function(id) {
    if (!confirm('Excluir este aviso?')) return;
    try { await deleteDoc(doc(db, 'avisos', id)); }
    catch(e) { alert('Erro ao excluir.'); }
  }

  function renderizarAvisos() {
    const el = document.getElementById('lista-avisos-painel');
    el.innerHTML = todosAvisos.length === 0
      ? `<div class="lista-vazia"><svg viewBox="0 0 24 24"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>Nenhum aviso publicado</div>`
      : todosAvisos.map(a => {
          const data = a.criadoEm ? new Date(a.criadoEm.seconds * 1000).toLocaleString('pt-BR') : '—';
          return `
            <div class="aviso-card">
              <div class="aviso-card-icon">
                <svg viewBox="0 0 24 24"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
              </div>
              <div class="aviso-corpo">
                <div class="aviso-titulo-txt">${a.titulo}</div>
                <div class="aviso-desc-txt">${a.descricao}</div>
                <div class="aviso-data-txt">${data}</div>
              </div>
              <button class="btn btn-danger" onclick="excluirAviso('${a.id}')">
                <svg viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M9 6V4h6v2"/></svg>
                Excluir
              </button>
            </div>`;
        }).join('');
  }
</script>
</body>
</html>
